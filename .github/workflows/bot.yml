name: 🤖 Copa 2026 — Bot Telegram

on:
  schedule:
    # ── PRÉ-COPA (até 11/06): esquenta 3x por dia ─────────────
    # 9h BRT = 12h UTC → curiosidade histórica
    - cron: '0 12 * * *'
    # 13h BRT = 16h UTC → previsão/análise
    - cron: '0 16 * * *'
    # 18h BRT = 21h UTC → stat histórico
    - cron: '0 21 * * *'

    # ── DURANTE A COPA ────────────────────────────────────────
    # 8h BRT = 11h UTC → jogos do dia
    - cron: '0 11 * * *'
    # Resumo pós-jogo: a cada hora
    - cron: '0 * * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: 'O que postar'
        required: true
        default: 'esquenta_curiosidade'
        type: choice
        options:
          - esquenta_curiosidade
          - esquenta_previsao
          - esquenta_stat
          - jogos
          - curiosidade
          - resumo

jobs:
  broadcast:
    name: Broadcast → Canal Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID:  ${{ secrets.TELEGRAM_CHANNEL_ID }}
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
      GROK_API_KEY:         ${{ secrets.GROK_API_KEY }}
      GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r copa2026/requirements.txt

      # ── PRÉ-COPA ──────────────────────────────────────────
      - name: 🏆 Curiosidade histórica (12h UTC / 9h BRT)
        if: github.event.schedule == '0 12 * * *' || github.event.inputs.mode == 'esquenta_curiosidade'
        run: python copa2026/broadcast.py esquenta_curiosidade

      - name: 🔮 Previsão do dia (16h UTC / 13h BRT)
        if: github.event.schedule == '0 16 * * *' || github.event.inputs.mode == 'esquenta_previsao'
        run: python copa2026/broadcast.py esquenta_previsao

      - name: 📊 Stat histórico (21h UTC / 18h BRT)
        if: github.event.schedule == '0 21 * * *' || github.event.inputs.mode == 'esquenta_stat'
        run: python copa2026/broadcast.py esquenta_stat

      # ── DURANTE A COPA ─────────────────────────────────────
      - name: ⚽ Jogos do dia (11h UTC / 8h BRT)
        if: github.event.schedule == '0 11 * * *' || github.event.inputs.mode == 'jogos'
        run: python copa2026/broadcast.py jogos

      - name: 📝 Resumo pós-jogo (a cada hora)
        if: github.event.schedule == '0 * * * *' || github.event.inputs.mode == 'resumo'
        run: python copa2026/broadcast.py resumo

      - name: 💡 Curiosidade com dados reais
        if: github.event.inputs.mode == 'curiosidade'
        run: python copa2026/broadcast.py curiosidade