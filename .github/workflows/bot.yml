name: 🤖 Copa 2026 — Bot Telegram

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
    - cron: '0 * * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: 'O que postar'
        required: true
        default: 'jogos'
        type: choice
        options:
          - jogos
          - curiosidade
          - resumo

jobs:
  broadcast:
    name: Broadcast → Canal Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID:  ${{ secrets.TELEGRAM_CHANNEL_ID }}
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
      GROK_API_KEY:         ${{ secrets.GROK_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r copa2026/requirements.txt

      - name: 📅 Jogos do dia (11h UTC)
        if: github.event.schedule == '0 11 * * *' || github.event.inputs.mode == 'jogos'
        run: python copa2026/broadcast.py jogos

      - name: 💡 Curiosidade do dia (12h UTC)
        if: github.event.schedule == '0 12 * * *' || github.event.inputs.mode == 'curiosidade'
        run: python copa2026/broadcast.py curiosidade

      - name: 📝 Resumo pós-jogo (a cada hora)
        if: github.event.schedule == '0 * * * *' || github.event.inputs.mode == 'resumo'
        run: python copa2026/broadcast.py resumo