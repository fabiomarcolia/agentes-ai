name: 📱 Copa 2026 — Captura X/Twitter

on:
  schedule:
    - cron: '0 9,13,17,21 * * *'
    - cron: '0 * * * *'

  workflow_dispatch:
    inputs:
      analyze_only:
        description: 'Só análise de sentimento'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  capture:
    name: Captura X → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GETXAPI_KEY:          ${{ secrets.GETXAPI_KEY }}
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
      GROK_API_KEY:         ${{ secrets.GROK_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r copa2026/requirements.txt

      - name: 📱 Captura e análise
        run: |
          if [ "${{ github.event.inputs.analyze_only }}" == "true" ]; then
            python copa2026/social_capture.py --analyze
          else
            python copa2026/social_capture.py
          fi

      - name: ✅ Concluído
        if: success()
        run: echo "Captura concluída em $(date -u '+%Y-%m-%d %H:%M UTC')"